<head>

<title>풍수요정</title>

   <link rel="icon" type="image/png" href="./favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Do+Hyeon&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --mint:#7fae82; --mint-deep:#5d8f61;
    --gold:#d4a860; --gold-deep:#b8863c;
    --plum:#4a3040; --blush:#f2b6b6;
    --paper:#fbf6e9; --bg1:#fdf6e3; --bg2:#eef3e0;
  }
  *{box-sizing:border-box;}
  body{margin:0;min-height:100vh;background:linear-gradient(160deg,var(--bg1),var(--bg2));
    font-family:'Noto Sans KR',sans-serif;color:var(--plum);display:flex;justify-content:center;
    padding:36px 16px 50px;}
  .wrap{width:100%;max-width:400px;text-align:center;}

  .avatar-wrap{position:relative;width:168px;height:168px;margin:0 auto 6px;}
  .avatar-glow{position:absolute;inset:-14px;border-radius:50%;
    background:radial-gradient(circle, rgba(212,168,96,0.35), rgba(212,168,96,0) 70%);}
  .avatar{position:relative;width:168px;height:168px;border-radius:50%;overflow:hidden;
    border:3px solid #fff;box-shadow:0 6px 20px rgba(74,48,64,0.15);background:#fdf6e3;}
  .avatar img{width:100%;height:100%;object-fit:cover;object-position:center 20%;transform:scale(1.7);}
  .sparkle{position:absolute;font-size:15px;color:var(--gold);animation:twinkle 2.4s ease-in-out infinite;}
  .s1{top:2px;right:14px;animation-delay:0s;}
  .s2{bottom:18px;left:0px;font-size:11px;animation-delay:0.8s;}
  .s3{top:40px;left:-10px;font-size:12px;animation-delay:1.5s;}
  @media (prefers-reduced-motion: reduce){ .sparkle{animation:none;} }
  @keyframes twinkle{0%,100%{opacity:0.25;transform:scale(0.85);}50%{opacity:1;transform:scale(1.15);}}

  .brand{font-family:'Do Hyeon',sans-serif;font-size:26px;color:var(--plum);margin:14px 0 4px;letter-spacing:0.02em;}
  .tagline{font-size:13px;color:var(--mint-deep);margin:0 0 26px;font-weight:500;line-height:1.6;}

  .card{display:block;background:var(--paper);border:1px solid rgba(184,134,60,0.35);border-radius:16px;
    padding:16px 18px;margin-bottom:12px;text-decoration:none;color:var(--plum);text-align:left;
    display:flex;align-items:center;gap:14px;box-shadow:0 2px 8px rgba(74,48,64,0.06);
    transition:transform .15s, box-shadow .15s;}
  .card:active{transform:scale(0.98);}
  .card .ico{flex:none;width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:18px;}
  .card .txt h4{font-family:'Do Hyeon',sans-serif;font-size:15px;margin:0 0 2px;font-weight:400;}
  .card .txt p{font-size:11.5px;color:#7a6a72;margin:0;}
  .card .arrow{margin-left:auto;color:var(--gold-deep);font-size:16px;flex:none;}

  .card.primary{background:linear-gradient(135deg,#fff8e8,var(--paper));border:1.5px solid var(--gold);
    box-shadow:0 4px 16px rgba(212,168,96,0.28);}
  .card.primary .ico{background:var(--gold);color:#fff;}
  .badge-new{background:var(--mint);color:#fff;font-size:9px;font-weight:700;padding:2px 7px;border-radius:8px;margin-left:6px;vertical-align:middle;}

  .ico.kakao{background:#fee500;color:#3c1e1e;}
  .ico.yt{background:#ff3b30;color:#fff;}
  .ico.ig{background:linear-gradient(135deg,#f9ce34,#ee2a7b,#6228d7);color:#fff;}
  .ico.tt{background:#010101;color:#fff;}

  .divider{font-size:11px;color:#a89a8f;margin:22px 0 14px;display:flex;align-items:center;gap:10px;}
  .divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(184,134,60,0.3);}

  footer{margin-top:28px;font-size:11px;color:#a89a8f;}
</style>
</head>
